<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style/styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day Surprise</title>
    <link rel="icon" type="image/x-icon" href="assets/heart.png">
</head>
<body>
    <div class="message-container">
        <div class="message" data-index="1">Since I met you, everything changed 💫</div>
        <div class="message" data-index="2">You became my reason to smile ✨</div>
        <div class="message" data-index="3">Every moment with you is magical 🪄</div>
        <div class="message" data-index="4">You're everything I never knew I needed 🎇</div>
        <div class="message" data-index="5">I had to let you know...</div>
        <div class="message" data-index="6">I love you 💝</div>
        
        <div class="final-question">
            <h2>Do I have your heart? 💫</h2>
            <div class="btn-group">
                <button class="valentine-btn yes-btn">Yes, I do! 💕</button>
                <button class="valentine-btn no-btn">Still Thinking 💭</button>
            </div>
        </div>
    </div>

    <div class="celebration"></div>
    <script src="script/main.js"></script>
</body>
</html>
